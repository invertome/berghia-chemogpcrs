name: berghia-gpcr
channels:
  - conda-forge
  - bioconda
  - defaults

# Version-pin policy: loosen pins to ranges that the solver can satisfy on
# Unity (May 2026 unity-bioconda channel state, where some tight pins like
# hmmer=3.3.2 + busco=5.4.7 + sepp >=4.3.10 are unsolvable). Use lower bounds
# only ('>=') so the solver can pick compatible versions; upper bounds only
# where there's a known incompatibility we want to avoid.
dependencies:
  # Core
  - python=3.10
  - pip

  # Bioinformatics tools — minimum versions to ensure feature support
  - hmmer>=3.3
  - hhsuite>=3.3
  - mafft>=7.5
  # Bead -align: FAMSA 2 (Deorowicz et al. 2024 NAR 52:e30) — best aligner for
  # large protein families (N>=1000). scripts/run_aligner.sh dispatches based
  # on input N: <200 -> MAFFT L-INS-i (gold-standard small),
  # 200-999 -> MAFFT --auto, >=1000 -> FAMSA 2.
  - famsa>=2.2
  # Bead -ryr / user direction: iqtree3 binary. The conda 'iqtree' package
  # tracks the latest IQ-TREE major series.
  - iqtree>=2.3
  - fasttree>=2.1
  - trimal>=1.4
  - clipkit>=1.3
  - cd-hit>=4.8
  - orthofinder>=2.5
  - hyphy>=2.5
  - minimap2>=2.26
  - samtools>=1.17
  - blast>=2.14
  - seqtk>=1.4
  - busco>=5.4
  - diamond>=2.1
  # Bead -325: miniprot for CDS recovery from genome assemblies
  - miniprot>=0.13
  # NCBI datasets CLI for genome downloads
  - ncbi-datasets-cli>=16.0
  # Bead -m6k null-distribution simulator
  - dendropy>=5.0

  # R and packages
  - r-base>=4.3
  - r-ape>=5.7

  # Optional tools (uncomment if needed)
  # - mrbayes>=3.2
  # - raxml-ng>=1.2
  # - cafe>=5.0
  # - tmalign

  # Build tools
  - make
  - gcc
  - openjdk>=11

  # Python packages via pip
  - pip:
    - biopython>=1.79
    - ete3>=3.1.2
    - pandas>=1.5.0
    - numpy>=1.21.0
    - matplotlib>=3.6.0
    - seaborn>=0.12.0
    - scipy>=1.11
    - requests>=2.28.0
    - statsmodels>=0.13
    # Bead -ar8: gffutils for tandem-cluster GFF parsing
    - gffutils>=0.13
    # Bead -e59: JCVI MCscan (Tang et al. 2024 iMeta 3:e211) — synteny via
    # LAST seeds, stricter C-score, replaces the legacy MCScanX path in
    # 06_synteny_and_mapping.sh. Requires `last` and `texlive-latex-base`
    # at the system level for the catalog ortholog command and figures.
    - jcvi>=1.4.15
    # Bead -iof: TreeShrink (Mai & Mirarab 2018, BMC Genomics 19:272) —
    # rogue-taxon / outlier-long-branch removal applied to per-OG and
    # global gene trees before downstream selection analysis.
    - treeshrink>=1.3.9
