; BRAKER4 config.ini for Phase 1f (bead -p49): protein-only EP mode against
; OrthoDB metazoa, run over the 134 unannotated-genome species.
;
; Reference schema:
;   https://github.com/Gaius-Augustus/BRAKER4 README, [paths]/[containers]/
;   [PARAMS]/[SLURM_ARGS]/[OMARK]/[fantasia] sections.
;
; The driver sbatch wrapper symlinks this file into the working dir as
; `config.ini` and runs snakemake from that dir, so BRAKER4's default
; cwd-based config discovery picks it up. Override via env:
;   BRAKER4_CONFIG=<abs-path> snakemake ...
;
; Per-param env overrides also work:
;   BRAKER4_MIN_CONTIG=1000 snakemake ...
; (uses the BRAKER4_<KEY_UPPER> convention)

[paths]
; Resolved relative to cwd (species_tree_data/braker4_run/ on Unity).
samples_file = samples.csv
; Writable AUGUSTUS config (the install script copies from container).
augustus_config_path = augustus_config

[containers]
; Pinned to v3.0.10 for reproducibility; the install script pulls this
; tag explicitly. Other defaults are fine for our protein-only EP mode.
braker3_image = docker://teambraker/braker3:v3.0.10

[PARAMS]
; Non-fungal organisms (default).
fungus = 0
; Skip contigs shorter than this (bp). Default 10000 is too aggressive
; for the lowest-N50 assemblies in Phase 1e (e.g. Dugesia japonica N50=1166).
; Drop to 5000 so we keep enough material for GeneMark training without
; dipping into the tiny-contig noise floor.
min_contig = 5000
; Standard genetic code for metazoa.
translation_table = 1
; Masking tool = Red (REpeat Detector), ADOPTED for Phase-1f in bead 8db
; (2026-07-02): ~217x faster masking, equal-or-better annotation quality on
; the same-species pilot, and it avoids the de-novo RepeatModeler failure mode
; that starves GeneMark self-training on divergent genomes (bead pfo: Nautilus
; 1560 genes under RepeatModeler vs 26540 under RED). Options: repeatmasker | red.
masking_tool = red
; Keep BUSCO + compleasm running for completeness QC.
skip_busco = 0
use_compleasm_hints = 1
; Run best_by_compleasm to rescue dropped BUSCOs after TSEBRA merge.
run_best_by_compleasm = 1
; Don't run ncRNA or OMArk or FANTASIA for Phase 1f — just want proteins + CDS.
run_ncrna = 0
run_omark = 0

[SLURM_ARGS]
; Resources per dispatched per-rule slurm job (the BRAKER4 Snakefile reads
; these). Driver job itself only needs 4 CPU + 16 GB (configured in
; sbatch_run_species_tree_phase1f.sh).
cpus_per_task = 48
mem_of_node = 120000
; 72h per per-rule job; failed rules get logged but don't abort the batch
; (--keep-going at the driver level).
max_runtime = 4320
